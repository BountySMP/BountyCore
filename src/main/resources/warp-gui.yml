# ─────────────────────────────────────────
#  Warp GUI Configuration
# ─────────────────────────────────────────
#  slot:  1-9  (position in the single-row GUI)
#  item:  Minecraft material name (e.g. GRASS_BLOCK, DIAMOND_SWORD)
#  name:  Display name  — use § for colors
#  lore:  List of lore lines — use § for colors
#
#  Use /setwarp <name> in-game to set the teleport destination.
#  Only warps that have been set with /setwarp will appear in the GUI.
# ─────────────────────────────────────────

