# Messages Configuration
# Placeholders:
# {player} - Player name
# {sender} - Sender name
# {reason} - Ban/mute reason
# {duration} - Duration (e.g., "2 hours", "1 day")
# {time_remaining} - Time remaining (e.g., "1d 5h", "30m")
# {amount} - Money amount
# {killer} - Killer name
# {victim} - Victim name
# {banned_by} - Who issued the ban
# {muted_by} - Who issued the mute
# {home} - Home name
# {seconds} - Combat tag seconds
# {group} - Group/rank name
# {permission} - Permission node

