name: BountyCore
version: '1.0.0'
main: com.bountysmp.bountyCore.BountyCore
api-version: '1.21'
softdepend: [Vault, PlaceholderAPI, CrazyCrates]

commands:
  balance:
    description: Check your balance
    aliases: [bal, money]
  pay:
    description: Pay another player
    usage: /pay <player> <amount>
  home:
    description: Open the homes GUI
    aliases: [homes]
  sethome:
    description: Set a home at your current location
    usage: /sethome <name>
  delhome:
    description: Delete a home
    usage: /delhome <name>
    aliases: [deletehome, removehome]
  tpa:
    description: Request to teleport to another player
    usage: /tpa <player>
  tpahere:
    description: Request another player to teleport to you
    usage: /tpahere <player>
  tpaccept:
    description: Accept a teleport request
    aliases: [tpyes]
  tpdeny:
    description: Deny a teleport request
    aliases: [tpno]
  spawn:
    description: Teleport to spawn
  setspawn:
    description: Set the server spawn point
  back:
    description: Teleport to your last location
  msg:
    description: Send a private message to a player
    usage: /msg <player> <message>
    aliases: [tell, whisper, w, m]
  r:
    description: Reply to the last player who messaged you
    usage: /r <message>
    aliases: [reply]
  bounty:
    description: View and manage bounties
    usage: /bounty [set <player> <amount>|<player>]
  eco:
    description: Economy admin commands
    usage: /eco give <player> <amount>
  tp:
    description: Teleport to a player
    usage: /tp <player>
  tphere:
    description: Teleport a player to you
    usage: /tphere <player>
  kick:
    description: Kick a player
    usage: /kick <player> [reason]
  ban:
    description: Permanently ban a player
    usage: /ban <player> [reason]
  tempban:
    description: Temporarily ban a player
    usage: /tempban <player> <duration> <reason>
  unban:
    description: Unban a player
    usage: /unban <player>
  mute:
    description: Mute a player
    usage: /mute <player> [reason]
  tempmute:
    description: Temporarily mute a player
    usage: /tempmute <player> <duration> [reason]
  unmute:
    description: Unmute a player
    usage: /unmute <player>
  s:
    description: Summon a player to you
    usage: /s <player>
  clearbounty:
    description: Clear a player's bounty
    usage: /clearbounty <player>
  setbounty:
    description: Set a player's bounty
    usage: /setbounty <player> <amount>
  padd:
    description: Add a permission or group to a player
    usage: /padd <player> <permission|group>
  prem:
    description: Remove a permission or group from a player
    usage: /prem <player> <permission|group>
  pinfo:
    description: Show all permissions and groups for a player
    usage: /pinfo <player>
  psearch:
    description: Search a player's permissions and groups
    usage: /psearch <player> <query>
  vanish:
    description: Toggle vanish mode
    aliases: [v]
  god:
    description: Toggle god mode
    aliases: [godmode]
  fly:
    description: Toggle flight mode
    usage: /fly [player]
  gms:
    description: Set gamemode to survival
    usage: /gms [player]
  gmc:
    description: Set gamemode to creative
    usage: /gmc [player]
  gmsp:
    description: Set gamemode to spectator
    usage: /gmsp [player]
  eat:
    description: Feed yourself
    usage: /eat
  feed:
    description: Feed a player
    usage: /feed [player]
  randomtp:
    description: Opens random teleport GUI
    aliases: [rtp]
  ah:
    description: Open auction house
    usage: /ah [return|search <query>]
    aliases: [auction, auctionhouse]
  orders:
    description: Manage buy orders
  team:
    description: Team management
    usage: /team [create|invite|accept|deny|leave|kick|disband|info|list|chat]
    aliases: [teams]
  settings:
    description: Open settings menu
    aliases: [options]
  shop:
    description: Open server shop
  sell:
    description: Sell items
    usage: /sell [hand|all]
  booster:
    description: Check your active sell booster
  sellbooster:
    description: Give a sell booster to a player
    usage: /sellbooster <player> <multiplier> <duration>
  warp:
    description: Teleport to a warp or open warp GUI
    usage: /warp [name]
  warpmanager:
    description: Manage server warps
    usage: /warpmanager <create|delete|list|seticon>
    aliases: [warpmgr]
  profile:
    description: View a player's profile
    usage: /profile <player>
  clearlag:
    description: Clear lag entities
    usage: /clearlag [reload]
  statswipe:
    description: Open stats wipe GUI
  keyall:
    description: Give keys to all online players
    usage: /keyall <crate> <amount>
  serverinfo:
    description: Open server info menu
    aliases: [sinfo]
  rules:
    description: Open server rules menu
  afk:
    description: Toggle AFK status
  alts:
    description: View player's alt accounts
    usage: /alts <player>
  freeze:
    description: Freeze a player
    usage: /freeze <player>
  freezelist:
    description: Open frozen players GUI
  heal:
    description: Heal yourself or another player
    usage: /heal [player]
  feed:
    description: Feed yourself or another player
    usage: /feed [player]
  findplayer:
    description: Find a player's location
    usage: /findplayer <player>
  ignore:
    description: Ignore a player
    usage: /ignore <player|list>
  invsee:
    description: View a player's inventory
    usage: /invsee <player>
  leaderboard:
    description: View server leaderboards
    aliases: [lb]
  nv:
    description: Toggle night vision
    usage: /nv [player]
    aliases: [nightvision]
  ping:
    description: Check your or another player's ping
    usage: /ping [player]
  playtime:
    description: Check playtime
    usage: /playtime [player]
  rename:
    description: Rename item in hand
    usage: /rename <name>
  report:
    description: Report a player
    usage: /report <player> <reason>
  helpop:
    description: Request help from staff
    usage: /helpop <message>
  sc:
    description: Staff chat
    usage: /sc [message]
    aliases: [staffchat]
  stafflist:
    description: View online staff
  staffmode:
    description: Toggle staff mode
  stats:
    description: View player stats
    usage: /stats [player]
  worth:
    description: Check item worth
    usage: /worth [material]

permissions:
  bounty.basic:
    description: Grants all basic player permissions (economy, homes, teleports, messaging, bounty)
    default: true
    children:
      # Economy commands
      bounty.balance: true
      bounty.pay: true
      # Home commands
      bounty.home: true
      bounty.sethome: true
      bounty.delhome: true
      # Teleport commands
      bounty.spawn: true
      bounty.back: true
      bounty.tpa: true
      bounty.tpahere: true
      bounty.tpaccept: true
      bounty.tpdeny: true
      # Messaging commands
      bounty.msg: true
      bounty.reply: true
      # Bounty commands
      bounty.bounty: true
      # Random TP command
      bounty.randomtp: true
      # Auction House
      bounty.ah: true
      # Orders
      bounty.orders: true
      # Team
      bounty.team: true
      # Settings
      bounty.settings: true
      # Shop
      bounty.shop: true
      # Sell
      bounty.sell: true
      # Warp commands
      bounty.warp: true
      # Info/Rules commands
      bounty.serverinfo: true
      bounty.rules: true
      # Booster command
      bounty.booster: true
      # Profile command
      bounty.profile: true
      # New basic commands
      bounty.afk: true
      bounty.ignore: true
      bounty.ping: true
      bounty.playtime: true
      bounty.leaderboard: true
      bounty.stats: true
      bounty.worth: true
      bounty.report: true
      bounty.helpop: true
